<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Beta Balancing System | Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .regime-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
        }

        .card-header {
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .metrics-table th, .metrics-table td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .metrics-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }

        #correlation-heatmap {
            display: grid;
            gap: 2px;
            margin-top: 1rem;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Alpha-Beta System</h1>
                <p style="color: var(--text-secondary)">Real-time Strategy Balancing & Risk Analytics</p>
            </div>
            <div id="market-regime" class="regime-badge">Detecting Regime...</div>
        </header>

        <div class="dashboard-grid">
            <!-- Dynamic Allocation -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Live Capital Allocation</h2>
                </div>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>

            <!-- Risk Correlation -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Asset Correlation Matrix</h2>
                </div>
                <div id="correlation-matrix-container">
                    <div id="correlation-labels" style="display: flex; justify-content: space-around; margin-bottom: 5px; font-size: 10px; color: var(--text-secondary)"></div>
                    <div id="correlation-heatmap"></div>
                </div>
            </div>

            <!-- Strategy Performance -->
            <div class="card" style="grid-column: span 1;">
                <div class="card-header">
                    <h2 class="card-title">Performance Summary</h2>
                </div>
                <table class="metrics-table">
                    <thead>
                        <tr>
                            <th>Strategy</th>
                            <th>Type</th>
                            <th>Return</th>
                            <th>Sharpe</th>
                        </tr>
                    </thead>
                    <tbody id="performance-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Real-time Market Data -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Active Market Watch</h2>
                </div>
                <div class="chart-container">
                    <canvas id="marketDataChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
